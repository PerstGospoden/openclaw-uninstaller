name: Bump Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read previous tag
        id: previous_tag
        run: |
          previous_tag=$(git tag --sort=-v:refname | head -n 1 || true)
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          version="${{ steps.current.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          next="$major.$minor.$patch"
          printf '%s\n' "$next" > VERSION
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip version]"
          git push

      - name: Create version tag
        run: |
          tag="v${{ steps.bump.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Build release bundle
        run: |
          mkdir -p dist/openclaw-uninstaller
          cp README.md dist/openclaw-uninstaller/
          cp README.en.md dist/openclaw-uninstaller/
          cp LICENSE dist/openclaw-uninstaller/
          cp VERSION dist/openclaw-uninstaller/
          cp uninstall-openclaw-windows.ps1 dist/openclaw-uninstaller/
          cp uninstall-openclaw-unix.sh dist/openclaw-uninstaller/
          cp run-uninstall-windows.bat dist/openclaw-uninstaller/
          cp run-uninstall-unix.command dist/openclaw-uninstaller/
          cp run-uninstall-linux.sh dist/openclaw-uninstaller/
          cd dist
          zip -r "openclaw-uninstaller-release.zip" openclaw-uninstaller

      - name: Generate release notes
        run: |
          previous_tag="${{ steps.previous_tag.outputs.tag }}"
          {
            echo "## 更新说明"
            echo
            if [ -n "$previous_tag" ]; then
              git log --oneline "$previous_tag..${{ github.sha }}" | sed 's/^/- /'
            else
              git log --oneline "${{ github.sha }}" --max-count=20 | sed 's/^/- /'
            fi
          } > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body_path: release-notes.md
          files: dist/openclaw-uninstaller-release.zip
