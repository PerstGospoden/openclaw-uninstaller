name: Publish Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "${{ startsWith(github.event.head_commit.message, 'chore: bump version to v') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: |
          mkdir -p dist/openclaw-uninstaller
          cp README.md dist/openclaw-uninstaller/
          cp README.en.md dist/openclaw-uninstaller/
          cp LICENSE dist/openclaw-uninstaller/
          cp VERSION dist/openclaw-uninstaller/
          cp uninstall-openclaw-windows.ps1 dist/openclaw-uninstaller/
          cp uninstall-openclaw-unix.sh dist/openclaw-uninstaller/
          cp run-uninstall-windows.bat dist/openclaw-uninstaller/
          cp run-uninstall-unix.command dist/openclaw-uninstaller/
          cp run-uninstall-linux.sh dist/openclaw-uninstaller/
          cd dist
          zip -r "openclaw-uninstaller-release.zip" openclaw-uninstaller

      - name: Generate release notes
        run: |
          current_tag="v${{ steps.version.outputs.version }}"
          previous_tag=$(git tag --sort=-v:refname | grep -vx "$current_tag" | head -n 1 || true)
          end_ref="HEAD^"
          if ! git rev-parse "$end_ref" >/dev/null 2>&1; then
            end_ref="HEAD"
          fi
          {
            echo "## 更新说明"
            echo
            if [ -n "$previous_tag" ]; then
              git log --oneline "$previous_tag..$end_ref" | sed 's/^/- /'
            else
              git log --oneline "$end_ref" --max-count=20 | sed 's/^/- /'
            fi
          } > release-notes.md

      - name: Create Git tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: dist/openclaw-uninstaller-release.zip
