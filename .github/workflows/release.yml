name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: |
          mkdir -p dist/openclaw-uninstaller
          cp README.md dist/openclaw-uninstaller/
          cp README.en.md dist/openclaw-uninstaller/
          cp LICENSE dist/openclaw-uninstaller/
          cp VERSION dist/openclaw-uninstaller/
          cp uninstall-openclaw-windows.ps1 dist/openclaw-uninstaller/
          cp uninstall-openclaw-unix.sh dist/openclaw-uninstaller/
          cp run-uninstall-windows.bat dist/openclaw-uninstaller/
          cp run-uninstall-unix.command dist/openclaw-uninstaller/
          cp run-uninstall-linux.sh dist/openclaw-uninstaller/
          cd dist
          zip -r "openclaw-uninstaller-release.zip" openclaw-uninstaller

      - name: Generate release notes
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag=$(git tag --sort=-v:refname | grep -vx "$current_tag" | head -n 1 || true)
          {
            echo "## 更新说明"
            echo
            if [ -n "$previous_tag" ]; then
              git log --oneline "$previous_tag..$current_tag" | sed 's/^/- /'
            else
              git log --oneline "$current_tag" --max-count=20 | sed 's/^/- /'
            fi
          } > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: dist/openclaw-uninstaller-release.zip
